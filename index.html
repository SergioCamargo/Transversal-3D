function tempColor(tempC){
  const tn = Math.min(Math.max((tempC-12)/(45-12),0),1);
  const stops = [
    [0.169,0.435,0.878],
    [0.129,0.714,0.788],
    [0.247,0.820,0.478],
    [0.910,0.827,0.243],
    [0.941,0.541,0.173],
    [0.886,0.231,0.231]
  ];
  const n = stops.length - 1;
  const x = tn * n;
  const i = Math.min(Math.floor(x), n-1);
  const f = x - i;
  const c0 = stops[i];
  const c1 = stops[i+1];
  return new THREE.Color(
    c0[0] + (c1[0]-c0[0])*f,
    c0[1] + (c1[1]-c0[1])*f,
    c0[2] + (c1[2]-c0[2])*f
  );
}

function roundedLabelCanvas(text, bg, fg){
  const canvas = document.createElement('canvas');
  canvas.width = 640;
  canvas.height = 160;
  const ctx = canvas.getContext('2d');
  const x = 24, y = 34, w = 592, h = 92, r = 14;

  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();

  ctx.fillStyle = bg;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.70)';
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.fillStyle = fg;
  ctx.font = '600 33px Segoe UI, Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 320, 80);
  return canvas;
}

function makeLabel(text, bg, position, scale=0.78){
  const texture = new THREE.CanvasTexture(roundedLabelCanvas(text, bg, '#ffffff'));
  texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
  const mat = new THREE.SpriteMaterial({ map:texture, transparent:true, depthTest:false });
  const sprite = new THREE.Sprite(mat);
  sprite.position.copy(position);
  sprite.scale.set(scale*3.0, scale*0.78, 1);
  sprite.renderOrder = 20;
  scene.add(sprite);
  return sprite;
}

function makeLeader(from, to, color=0xffffff){
  const geo = new THREE.BufferGeometry().setFromPoints([from, to]);
  const mat = new THREE.LineBasicMaterial({ color, transparent:true, opacity:0.75 });
  const line = new THREE.Line(geo, mat);
  line.renderOrder = 15;
  scene.add(line);

  const dot = new THREE.Mesh(
    new THREE.SphereGeometry(0.035, 12, 12),
    new THREE.MeshBasicMaterial({ color })
  );
  dot.position.copy(to);
  dot.renderOrder = 16;
  scene.add(dot);
}

function box(size, pos, mat){
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(size.x, size.y, size.z), mat);
  mesh.position.copy(pos);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  return mesh;
}

function linePoints(p0, p1, samples, t0, t1, temp0, temp1){
  const pts = [];
  for (let i=0; i<=samples; i++){
    const u = i/samples;
    pts.push({
      p: new THREE.Vector3(
        p0.x + (p1.x-p0.x)*u,
        p0.y + (p1.y-p0.y)*u,
        p0.z + (p1.z-p0.z)*u
      ),
      tt: t0 + (t1-t0)*u,
      temp: temp0 + (temp1-temp0)*u
    });
  }
  return pts;
}

function connectorPoints(points, t0, t1, temp0, temp1, samples=40){
  const curve = new THREE.CatmullRomCurve3(points, false, 'catmullrom', 0.45);
  const pts = [];
  for (let i=0; i<=samples; i++){
    const u = i/samples;
    pts.push({
      p: curve.getPoint(u),
      tt: t0 + (t1-t0)*u,
      temp: temp0 + (temp1-temp0)*u
    });
  }
  return pts;
}

// Geometría helicoidal en planta tomada del modelo Python:
// x = x_base + vx*t + rx*sin(t)
// z = z0     + A*cos(t)
// y = profundidad constante
//
// En el desarrollo original la bobina se calcula con make_loopy_coil_fill().
// Aquí se mapea ese plano 2D al espacio 3D:
//   x_modelo -> X longitudinal de la vía
//   y_modelo -> Z lateral de la vía
//   z_pipe   -> Y profundidad bajo la calzada
function helixPoints(x0, x1, y0, z0, radius, turns, samples, phase, t0, t1, temp0, temp1){
  const pts = [];

  const phi = phase;
  const T = Math.PI * 2 * turns;

  // rx controla el radio de curvatura longitudinal del lazo.
  // A controla el ancho lateral ocupado por la banda.
  const rx = radius;
  const A = radius * LOOP_LATERAL_RATIO;

  const sin0 = Math.sin(phi);
  const sinT = Math.sin(T + phi);

  const xBase = x0 - rx * sin0;
  const vx = (x1 - x0 - rx * (sinT - sin0)) / T;

  for (let i=0; i<=samples; i++){
    const u = i / samples;
    const t = u * T;
    const s = t + phi;

    const x = xBase + vx * t + rx * Math.sin(s);
    const y = y0;
    const z = z0 + A * Math.cos(s);

    pts.push({
      p: new THREE.Vector3(x,y,z),
      tt: t0 + (t1-t0)*u,
      temp: temp0 + (temp1-temp0)*u
    });
  }

  return pts;
}

function addArrowOnCurve(curve, frac, scale=1.0){
  const pos = curve.getPointAt(frac);
  const tan = curve.getTangentAt(frac).normalize();
  const cone = new THREE.Mesh(
    new THREE.ConeGeometry(0.072*scale, 0.23*scale, 20),
    new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:0.92 })
  );
  cone.position.copy(pos.clone().add(tan.clone().multiplyScalar(0.05)));
  cone.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), tan);
  cone.renderOrder = 12;
  scene.add(cone);
  return cone;
}

// Terreno, vía y capas
// =============================================================
const layerMeshes = {};

});

const roadCanvas = document.createElement('canvas');
roadCanvas.width = 1024;
roadCanvas.height = 512;
const rctx = roadCanvas.getContext('2d');
const roadTex = new THREE.CanvasTexture(roadCanvas);
const roadState = { heatSurface:true };

function drawRoad(pulse){
  rctx.clearRect(0,0,1024,512);
  rctx.fillStyle = '#25282d';
  rctx.fillRect(0,0,1024,512);

  const img = rctx.getImageData(0,0,1024,512);
  for (let i=0; i<img.data.length; i+=4){
    const n = Math.random()*22;
    img.data[i]   = Math.min(255, img.data[i] + n);
    img.data[i+1] = Math.min(255, img.data[i+1] + n);
    img.data[i+2] = Math.min(255, img.data[i+2] + n);
  }
  rctx.putImageData(img,0,0);

  if (roadState.heatSurface) {
    const lanes = [0.35, 0.65];
    lanes.forEach(v=>{
      const cy = v * 512;
      const grad = rctx.createLinearGradient(0, cy-84, 0, cy+84);
      const a = 0.30 + pulse*0.30;
      grad.addColorStop(0.00, 'rgba(240,128,35,0)');
      grad.addColorStop(0.42, `rgba(240,128,35,${a})`);
      grad.addColorStop(0.50, `rgba(255,158,56,${a+0.14})`);
      grad.addColorStop(0.58, `rgba(240,128,35,${a})`);
      grad.addColorStop(1.00, 'rgba(240,128,35,0)');
      rctx.fillStyle = grad;
      rctx.fillRect(0, cy-84, 1024, 168);
    });
  }

  rctx.strokeStyle = '#e6e8eb';
  rctx.lineWidth = 7;
  rctx.setLineDash([]);
  rctx.beginPath();
  rctx.moveTo(30, 42);
  rctx.lineTo(994, 42);
  rctx.moveTo(30, 470);
  rctx.lineTo(994, 470);
  rctx.stroke();

  rctx.strokeStyle = '#e5c343';
  rctx.lineWidth = 5;
  rctx.beginPath();
  rctx.moveTo(30, 244);
  rctx.lineTo(994, 244);
  rctx.moveTo(30, 268);
  rctx.lineTo(994, 268);
  rctx.stroke();

  roadTex.needsUpdate = true;
}
drawRoad(0.35);

// =============================================================
// Sistema transversal corregido
// =============================================================
// Esta versión evita conexiones por encima de la vía.
// Las conexiones bomba-colectores bajan primero al nivel enterrado,
// rodean por el extremo izquierdo del módulo y entran a los colectores.
// Los ramales quedan enfrentados e intercalados:
//   - banda inferior: colectores en el borde inferior de la vía
//   - banda superior: colectores en el borde superior de la vía
//   - las U quedan hacia el interior, como en el VOXI transversal.

const pumpHot = new THREE.Vector3(-3.50, 0.20, -2.72);
const pumpRet = new THREE.Vector3(-3.50, 0.12, -3.36);

const XMIN = -3.45;
const XMAX =  4.05;
const yPipe = -0.76;

const L_model = 1.20;
const W_model = 0.90;

// Bandas del código Python transversal
const y0_1_m = 0.02;
const y1_1_m = 0.02 + 0.90*(2.6/7.0);
const y0_2_m = 0.52;
const y1_2_m = 0.52 + (y1_1_m - y0_1_m);

const N_RAMALES = 8;
const GAP_VIS = 0.12;

const zMinRoad = -1.65;
const zMaxRoad =  1.65;

function zMap(yModel){
  return zMinRoad + (yModel / W_model) * (zMaxRoad - zMinRoad);
}

const circuits = [];

function appendToPath(path, seg){
  if (path.length && seg.length) seg = seg.slice(1);
  path.push(...seg);
}

function connectorPoints(points, t0, t1, temp0, temp1, samples=40){
  const curve = new THREE.CatmullRomCurve3(points, false, 'catmullrom', 0.45);
  const pts = [];
  for (let i=0; i<=samples; i++){
    const u = i/samples;
    pts.push({
      p: curve.getPoint(u),
      tt: t0 + (t1-t0)*u,
      temp: temp0 + (temp1-temp0)*u
    });
  }
  return pts;
}

function linePoints(p0, p1, samples, t0, t1, temp0, temp1){
  const pts = [];
  for (let i=0; i<=samples; i++){
    const u = i/samples;
    pts.push({
      p: new THREE.Vector3(
        p0.x + (p1.x-p0.x)*u,
        p0.y + (p1.y-p0.y)*u,
        p0.z + (p1.z-p0.z)*u
      ),
      tt: t0 + (t1-t0)*u,
      temp: temp0 + (temp1-temp0)*u
    });
  }
  return pts;
}

function uTurnPoints(x1, x2, y, zFar, samples, t0, t1, temp0, temp1){
  const pts = [];
  const xc = 0.5*(x1+x2);
  const rx = Math.abs(x2-x1)/2;
  const rz = 0.105;
  for (let i=0; i<=samples; i++){
    const u = i/samples;
    const a = Math.PI - u*Math.PI;
    const x = xc + rx*Math.cos(a);
    const z = zFar + rz*Math.sin(a);
    pts.push({
      p: new THREE.Vector3(x, y, z),
      tt: t0 + (t1-t0)*u,
      temp: temp0 + (temp1-temp0)*u
    });
  }
  return pts;
}

function makeCurveFromData(pathData){
  const rawPts = pathData.map(d => d.p);
  const curve = new THREE.CatmullRomCurve3(rawPts, false, 'catmullrom', 0.45);
  curve.arcLengthDivisions = 1800;

  const dist = [0];
  for (let i=1; i<pathData.length; i++){
    dist[i] = dist[i-1] + pathData[i].p.distanceTo(pathData[i-1].p);
  }
  const totalDist = dist[dist.length-1];

  function tempAtFrac(f){
    const target = f * totalDist;
    let lo = 0, hi = dist.length - 1;
    while (lo < hi){
      const mid = Math.floor((lo + hi) / 2);
      if (dist[mid] < target) lo = mid + 1;
      else hi = mid;
    }
    const i = Math.max(1, lo);
    const d0 = dist[i-1], d1 = dist[i];
    const k = (d1-d0)>0 ? (target-d0)/(d1-d0) : 0;
    return pathData[i-1].temp + (pathData[i].temp - pathData[i-1].temp) * k;
  }

  return { curve, tempAtFrac };
}

function createColoredTube(pathData, radius=0.044, radialSeg=14, segments=360){
  const obj = makeCurveFromData(pathData);
  const curve = obj.curve;
  const tubeGeo = new THREE.TubeGeometry(curve, segments, radius, radialSeg, false);
  const pos = tubeGeo.attributes.position;
  const colors = new Float32Array(pos.count * 3);
  const ringCount = segments + 1;

  for (let ring=0; ring<ringCount; ring++){
    const frac = ring / (ringCount - 1);
    const c = tempColor(obj.tempAtFrac(frac));
    for (let rs=0; rs<=radialSeg; rs++){
      const idx = ring*(radialSeg+1)+rs;
      if (idx >= pos.count) continue;
      colors[idx*3]   = c.r;
      colors[idx*3+1] = c.g;
      colors[idx*3+2] = c.b;
    }
  }
  tubeGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const tubeMat = new THREE.MeshStandardMaterial({
    vertexColors:true,
    roughness:0.28,
    metalness:0.18,
    emissive:0x222222,
    emissiveIntensity:0.18
  });

  const tubeMesh = new THREE.Mesh(tubeGeo, tubeMat);
  tubeMesh.castShadow = true;
  tubeMesh.receiveShadow = true;
  scene.add(tubeMesh);

  obj.tubeMesh = tubeMesh;
  return obj;
}

function createStaticPipe(points, temp0, temp1, radius=0.047, segments=160){
  const path = [];
  points.forEach((p, i)=>{
    const u = points.length === 1 ? 0 : i/(points.length-1);
    path.push({ p, tt:u, temp:temp0 + (temp1-temp0)*u });
  });
  return createColoredTube(path, radius, 12, segments);
}

function addArrowOnCurve(curve, frac, scale=1.0){
  const pos = curve.getPointAt(frac);
  const tan = curve.getTangentAt(frac).normalize();
  const cone = new THREE.Mesh(
    new THREE.ConeGeometry(0.072*scale, 0.23*scale, 20),
    new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:0.92 })
  );
  cone.position.copy(pos.clone().add(tan.clone().multiplyScalar(0.05)));
  cone.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), tan);
  cone.renderOrder = 12;
  scene.add(cone);
  return cone;
}

function createParticlesForCurve(curveObj, n=4){
  const particles = [];
  for (let i=0; i<n; i++){
    const geo = new THREE.SphereGeometry(0.043, 12, 12);
    const mat = new THREE.MeshStandardMaterial({
      emissive:0xffffff,
      emissiveIntensity:1.05,
      color:0xffffff,
      roughness:0.2
    });
    const m = new THREE.Mesh(geo, mat);
    scene.add(m);
    particles.push({ mesh:m, offset:i/n });
  }
  return particles;
}

function registerPipeAnimation(name, pipeObj, glowObj, arrowFracs, nParticles){
  const obj = {
    name,
    curve: pipeObj.curve,
    tempAtFrac: pipeObj.tempAtFrac,
    tubeMesh: pipeObj.tubeMesh,
    glow: glowObj || null,
    arrows: arrowFracs.map(f => addArrowOnCurve(pipeObj.curve, f, 0.9)),
    particles: createParticlesForCurve(pipeObj, nParticles)
  };
  circuits.push(obj);
  return obj;
}

function createBranchCircuit(name, xCenter, nearZ, farZ, supplyZ, returnZ, bandIndex, mirror=false){
  let x1 = xCenter - GAP_VIS/2;
  let x2 = xCenter + GAP_VIS/2;

  if (mirror){
    const tmp = x1;
    x1 = x2;
    x2 = tmp;
  }

  let pathData = [];

  appendToPath(pathData, connectorPoints([
    new THREE.Vector3(x1, yPipe, supplyZ),
    new THREE.Vector3(x1, yPipe, nearZ)
  ], 0.00, 0.08, 45, 44, 10));

  appendToPath(pathData, linePoints(
    new THREE.Vector3(x1, yPipe, nearZ),
    new THREE.Vector3(x1, yPipe, farZ),
    42, 0.08, 0.43, 44, 37
  ));

  appendToPath(pathData, uTurnPoints(
    x1, x2, yPipe, farZ, 18, 0.43, 0.55, 37, 35
  ));

  appendToPath(pathData, linePoints(
    new THREE.Vector3(x2, yPipe, farZ),
    new THREE.Vector3(x2, yPipe, nearZ),
    42, 0.55, 0.90, 35, 28
  ));

  appendToPath(pathData, connectorPoints([
    new THREE.Vector3(x2, yPipe, nearZ),
    new THREE.Vector3(x2, yPipe, returnZ)
  ], 0.90, 1.00, 28, 24, 10));

  const branch = createColoredTube(pathData, 0.043, 14, 260);
  branch.name = name;

  const glowGeo = new THREE.TubeGeometry(branch.curve, 260, 0.073, 8, false);
  const glowMat = new THREE.MeshBasicMaterial({
    color: bandIndex === 0 ? 0xff7a18 : 0xffaa22,
    transparent:true,
    opacity:0.13,
    depthWrite:false
  });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  glow.renderOrder = 2;
  scene.add(glow);

  const obj = {
    name,
    curve: branch.curve,
    tempAtFrac: branch.tempAtFrac,
    tubeMesh: branch.tubeMesh,
    glow,
    arrows: [
      addArrowOnCurve(branch.curve, 0.22, 0.82),
      addArrowOnCurve(branch.curve, 0.64, 0.82),
      addArrowOnCurve(branch.curve, 0.86, 0.82)
    ],
    particles: createParticlesForCurve(branch, 5)
  };
  circuits.push(obj);
  return obj;
}

function createBandTransversal(bandName, y0Model, y1Model, bandIndex, interleaved=false){
  const z0 = zMap(y0Model);
  const z1 = zMap(y1Model);

  // Banda inferior: colectores al borde inferior.
  // Banda superior: colectores al borde superior.
  const lowerBand = bandIndex === 0;
  const nearZ = lowerBand ? z0 : z1;
  const farZ  = lowerBand ? z1 : z0;

  const dir = lowerBand ? -1 : 1;
  const supplyZ = nearZ + dir*0.12;
  const returnZ = nearZ + dir*0.27;

  const xLeft = XMIN - 0.22;
  const xRight = XMAX + 0.22;

  const supply = createStaticPipe([
    new THREE.Vector3(xLeft,  yPipe, supplyZ),
    new THREE.Vector3(xRight, yPipe, supplyZ)
  ], 45, 42, 0.052, 160);

  const ret = createStaticPipe([
    new THREE.Vector3(xRight, yPipe, returnZ),
    new THREE.Vector3(xLeft,  yPipe, returnZ)
  ], 25, 16, 0.052, 160);

  const supplyGlow = new THREE.Mesh(
    new THREE.TubeGeometry(supply.curve, 160, 0.082, 8, false),
    new THREE.MeshBasicMaterial({ color:0xff5f1a, transparent:true, opacity:0.11, depthWrite:false })
  );
  scene.add(supplyGlow);

  const retGlow = new THREE.Mesh(
    new THREE.TubeGeometry(ret.curve, 160, 0.078, 8, false),
    new THREE.MeshBasicMaterial({ color:0x1fb9ff, transparent:true, opacity:0.10, depthWrite:false })
  );
  scene.add(retGlow);

  const branchCenters = [];
  const baseStep = (XMAX - XMIN) / Math.max(N_RAMALES - 1, 1);

  if (interleaved){
    for (let i=0; i<N_RAMALES - 1; i++){
      branchCenters.push(XMIN + 0.5*baseStep + i*baseStep);
    }
  } else {
    for (let i=0; i<N_RAMALES; i++){
      branchCenters.push(XMIN + i*baseStep);
    }
  }

  branchCenters.forEach((xc, i)=>{
    createBranchCircuit(
      `${bandName} ramal ${i+1}`,
      xc,
      nearZ,
      farZ,
      supplyZ,
      returnZ,
      bandIndex,
      !lowerBand
    );
  });

  // Conexiones enterradas bomba -> colectores.
  // Se llevan por el extremo izquierdo, para que no crucen por encima de la vía.
  const outsideZ = -2.32;
  const leftTrench = XMIN - 0.65;

  const hotConn = createStaticPipe([
    pumpHot,
    new THREE.Vector3(-3.52, yPipe, -3.02),
    new THREE.Vector3(leftTrench, yPipe, outsideZ),
    new THREE.Vector3(leftTrench, yPipe, supplyZ),
    new THREE.Vector3(xLeft, yPipe, supplyZ)
  ], 45, 45, 0.048, 210);

  const retConn = createStaticPipe([
    new THREE.Vector3(xLeft, yPipe, returnZ),
    new THREE.Vector3(leftTrench, yPipe, returnZ),
    new THREE.Vector3(leftTrench, yPipe, outsideZ),
    new THREE.Vector3(-3.52, yPipe, -3.14),
    pumpRet
  ], 18, 12, 0.048, 210);

  registerPipeAnimation(bandName + ' impulsión', supply, supplyGlow, [0.18, 0.58], 5);
  registerPipeAnimation(bandName + ' retorno', ret, retGlow, [0.35, 0.72], 5);
  registerPipeAnimation(bandName + ' conexión impulsión enterrada', hotConn, null, [0.62], 3);
  registerPipeAnimation(bandName + ' conexión retorno enterrada', retConn, null, [0.45], 3);

  return { nearZ, farZ, supplyZ, returnZ };
}

const bandInf = createBandTransversal('Banda inferior', y0_1_m, y1_1_m, 0, false);
const bandSup = createBandTransversal('Banda superior', y0_2_m, y1_2_m, 1, true);

const layerControls = [
  { key:'road',    show:'showRoad',    range:'opRoad',    value:'valRoad' },
  { key:'slab',    show:'showSlab',    range:'opSlab',    value:'valSlab' },
  { key:'subBase', show:'showSubBase', range:'opSubBase', value:'valSubBase' },
  { key:'base',    show:'showBase',    range:'opBase',    value:'valBase' },
  { key:'soil',    show:'showSoil',    range:'opSoil',    value:'valSoil' }
];

function applyLayerControls(){
  layerControls.forEach(c=>{
    const mesh = layerMeshes[c.key];
    const show = document.getElementById(c.show).checked;
    const op = parseFloat(document.getElementById(c.range).value);
    document.getElementById(c.value).textContent = Math.round(op*100) + '%';

    mesh.visible = show && op > 0.01;
    mesh.material.transparent = true;
    mesh.material.opacity = op;
    mesh.material.depthWrite = op > 0.72;
    mesh.material.needsUpdate = true;
  });

  const showFlow = document.getElementById('showFlow').checked;
  circuits.forEach(c=>{
    c.particles.forEach(p => p.mesh.visible = showFlow);
    c.arrows.forEach(a => a.visible = showFlow);
    if (c.glow) c.glow.visible = showFlow;
  });

  roadState.heatSurface = document.getElementById('showHeat').checked;
  drawRoad(0.55);
}

layerControls.forEach(c=>{
  document.getElementById(c.show).addEventListener('change', applyLayerControls);
  document.getElementById(c.range).addEventListener('input', applyLayerControls);
});
document.getElementById('showFlow').addEventListener('change', applyLayerControls);
document.getElementById('showHeat').addEventListener('change', applyLayerControls);

function setLayerPreset(values){
  Object.entries(values).forEach(([id,val])=>{
    const el = document.getElementById(id);
    if (!el) return;
    if (typeof val === 'boolean') el.checked = val;
    else el.value = val;
  });
  applyLayerControls();
}

// Animación
// =============================================================
let running = true;
document.getElementById('toggleBtn').addEventListener('click', e=>{
  running = !running;
  e.target.textContent = running ? 'Pausar flujo' : 'Reanudar flujo';
});

const clock = new THREE.Clock();
let elapsed = 0;
const SPEED = 0.050;

function animate(){
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  if (running) elapsed += dt;

  circuits.forEach(c=>{
    c.particles.forEach(p=>{
      const f = (elapsed*SPEED + p.offset) % 1;
      const pos = c.curve.getPointAt(f);
      const col = tempColor(c.tempAtFrac(f));
      p.mesh.position.copy(pos);
      p.mesh.material.color.copy(col);
      p.mesh.material.emissive.copy(col);
    });
    if (c.glow && c.glow.material) c.glow.material.opacity = 0.10 + 0.07*(0.5 + 0.5*Math.sin(elapsed*2.0));
  });

  fan.rotation.x += running ? 0.08 : 0;

  const pulse = 0.5 + 0.5*Math.sin(elapsed*2.0);
  if (running && Math.floor(elapsed*8)%2===0) drawRoad(pulse);

  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
